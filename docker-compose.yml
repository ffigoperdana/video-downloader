services:
  saveit:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "7860"
    environment:
      YTDLP_COOKIES_BASE64: ${YTDLP_COOKIES_BASE64:-}
      SOCIAL_COOKIES_BASE64: ${SOCIAL_COOKIES_BASE64:-}
      # Optional override for a dedicated Instagram login session. When unset,
      # Instagram yt-dlp extraction uses SOCIAL_COOKIES_BASE64.
      INSTAGRAM_COOKIES_BASE64: ${INSTAGRAM_COOKIES_BASE64:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
