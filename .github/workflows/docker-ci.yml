name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-compose:
    name: Build and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build image
        run: docker compose --progress plain build --pull

      - name: Start application
        run: docker compose up --detach --no-build

      - name: Wait for healthy container
        shell: bash
        run: |
          container_id="$(docker compose ps --quiet saveit)"

          if [ -z "$container_id" ]; then
            echo "The saveit container was not created."
            exit 1
          fi

          for attempt in {1..30}; do
            status="$(docker inspect --format '{{.State.Health.Status}}' "$container_id")"
            echo "Health check $attempt/30: $status"

            if [ "$status" = "healthy" ]; then
              curl --fail --silent --show-error http://127.0.0.1:8080/ > /dev/null
              exit 0
            fi

            if [ "$status" = "unhealthy" ]; then
              exit 1
            fi

            sleep 5
          done

          echo "Container did not become healthy in time."
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop application
        if: always()
        run: docker compose down --volumes --remove-orphans
